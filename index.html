<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="ConClár Programme Guide" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>ConClár Program Guide</title>
    <script>
      // Resolve the theme before first paint to avoid a flash. Mirrors the
      // resolution logic in ThemeSelector: "dark"/"light" force it, anything
      // else (incl. "browser" or no saved choice) follows the OS preference.
      (function () {
        try {
          var mode = localStorage.getItem("dark_mode");
          var isDark =
            mode === "dark" ||
            (mode !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = isDark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
